<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Logo Animation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #1a2d59; /* Solid deep blue as requested */
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Vibrating Calculator */
        .calculator {
            width: 140px;
            height: 180px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 24px;
            border: 3px solid #39d6c3;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.1);
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            animation: vibrate 0.1s infinite linear;
            margin-top: 40px;
        }

        @keyframes vibrate {
            0% { transform: translate(0,0) rotate(0); }
            25% { transform: translate(1px, 1px) rotate(0.2deg); }
            50% { transform: translate(-1px, -1px) rotate(-0.2deg); }
            75% { transform: translate(1px, -1px) rotate(0.2deg); }
            100% { transform: translate(0,0) rotate(0); }
        }

        /* Calculator Screen */
        .screen {
            width: 100%;
            height: 45px;
            background: rgba(57,214,195,0.05);
            border-radius: 12px;
            border: 2px solid rgba(57,214,195,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #39d6c3;
            font-family: 'Courier New', Courier, monospace;
            font-size: 20px;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(57,214,195,0.6);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
            margin-bottom: 15px;
        }

        /* Buttons Grid */
        .buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .btn {
            height: 18px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
        }

        /* Bobbing Hat */
        .hat {
            position: absolute;
            top: 10px;
            z-index: 10;
            width: 120px;
            height: 120px;
            animation: bob 3s ease-in-out infinite;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5));
        }

        @keyframes bob {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
        }

        .mortarboard {
            fill: #38bdf8;
        }

        /* Numbers Logic */
        .value-change {
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Decoration Glow -->
        <div style="position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(57,214,195,0.1) 0%, transparent 70%); filter: blur(40px);"></div>

        <!-- Floating Hat -->
        <div class="hat">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path class="mortarboard" d="M22 10L12 5L2 10L12 15L22 10Z" />
                <path class="mortarboard" d="M6 12V17C6 17 9 19 12 19C15 19 18 17 18 17V12" />
                <path class="mortarboard" d="M20 10V14" />
            </svg>
        </div>

        <!-- Vibrating Calculator -->
        <div class="calculator">
            <div class="screen" id="screen">18.5</div>
            <div class="buttons">
                <div class="btn"></div><div class="btn"></div><div class="btn"></div>
                <div class="btn"></div><div class="btn"></div><div class="btn"></div>
                <div class="btn"></div><div class="btn"></div><div class="btn" style="background:#39d6c3;opacity:0.6"></div>
            </div>
        </div>
    </div>

    <script>
        const screen = document.getElementById('screen');
        const values = ["18.5", "19.2", "20.0", "15.8", "17.4", "e7s"];
        let i = 0;
        setInterval(() => {
            i = (i + 1) % values.length;
            screen.style.opacity = 0;
            setTimeout(() => {
                screen.textContent = values[i];
                screen.style.opacity = 1;
            }, 300);
        }, 2000);
    </script>
</body>
</html>
