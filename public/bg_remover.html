<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Asset Background Remover Tool</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }
        .container {
            max-width: 900px;
            background: #1e293b;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { margin-bottom: 30px; background: linear-gradient(135deg, #39d6c3, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .canvas-area {
            margin: 20px 0;
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            background: repeating-conic-gradient(#334155 0% 25%, #1e293b 0% 50%) 50% / 20px 20px;
        }
        canvas { max-width: 100%; height: auto; display: block; margin: 0 auto; }
        .controls { display: flex; gap: 15px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
        button {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-dark { background: #39d6c3; color: #0f172a; }
        .btn-white { background: #f59e0b; color: #0f172a; }
        .btn-download { background: #38bdf8; color: #0f172a; }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        .status { margin-top: 15px; font-size: 14px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <h1>3D Asset Background Remover</h1>
    <p>Choisissez un asset et le type de fond à supprimer.</p>
    
    <div class="controls">
        <!-- Student has dark blue bg -->
        <button class="btn-dark" onclick="process('/student_3d.png', 'dark')">🎓 Clean Student (Fond sombre)</button>
        <!-- User's laptop photo has white bg -->
        <button class="btn-white" onclick="process('/laptop_3d.png', 'white')">💻 Clean Laptop (Fond blanc)</button>
    </div>

    <div class="canvas-area">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <button id="downloadBtn" class="btn-download" style="display: none;" onclick="downloadResult()">⬇️ Télécharger le PNG Transparent</button>
        <button id="saveBtn" class="btn-download" style="display: none; background: #10b981;" onclick="saveToPublic()">💾 Sauvegarder dans /public</button>
    </div>

    <div class="status" id="status">Prêt. Sélectionnez un asset à nettoyer.</div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const downloadBtn = document.getElementById('downloadBtn');
    const saveBtn = document.getElementById('saveBtn');
    let currentFile = '';

    async function process(imageUrl, mode) {
        currentFile = imageUrl;
        status.innerText = `Chargement de ${imageUrl}...`;
        downloadBtn.style.display = 'none';
        saveBtn.style.display = 'none';

        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = imageUrl + '?t=' + Date.now();

        img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            let removed = 0;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                let shouldRemove = false;

                if (mode === 'dark') {
                    // Remove dark blue/navy background from student_3d.png
                    // Target: #1a2d59 and similar dark blues
                    const targetR = 26, targetG = 45, targetB = 89;
                    const diff = Math.abs(r - targetR) + Math.abs(g - targetG) + Math.abs(b - targetB);
                    if (diff < 80) shouldRemove = true;
                    
                    // Also remove very dark pixels near black
                    if (r < 20 && g < 20 && b < 20) shouldRemove = true;

                } else if (mode === 'white') {
                    // Remove white/near-white background from laptop photo
                    // Pure white and near-white  
                    const threshold = 240;
                    if (r > threshold && g > threshold && b > threshold) shouldRemove = true;
                    
                    // Also light grey
                    if (r > 220 && g > 220 && b > 220 && Math.abs(r-g) < 15 && Math.abs(g-b) < 15) shouldRemove = true;
                }

                if (shouldRemove) {
                    data[i + 3] = 0;
                    removed++;
                }
            }

            ctx.putImageData(imageData, 0, 0);
            status.innerText = `✅ Fond supprimé ! (${removed} pixels transparents). Téléchargez ci-dessous.`;
            
            downloadBtn.style.display = 'block';
            saveBtn.style.display = 'block';
        };

        img.onerror = () => {
            status.innerText = `❌ Erreur: impossible de charger ${imageUrl}`;
        };
    }

    function downloadResult() {
        const link = document.createElement('a');
        link.download = currentFile.replace('/', '').replace('.png', '_transparent.png');
        link.href = canvas.toDataURL('image/png');
        link.click();
        status.innerText = '⬇️ Téléchargement commencé ! Placez le fichier dans /public en renommant en laptop_3d.png ou student_3d.png.';
    }

    // Auto-save via fetch to a local endpoint (won't work without server, but useful for display)
    function saveToPublic() {
        const base64 = canvas.toDataURL('image/png');
        window._lastBase64 = base64;
        window._lastFile = currentFile;
        status.innerText = '✅ Base64 disponible dans window._lastBase64. Prêt pour extraction automatique.';
    }
</script>

</body>
</html>
