<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Laptop Logo Alignment Tool</title>
    <style>
        body { margin: 0; padding: 0; background: #1a2d59; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
        .canvas-area { position: relative; width: 1024px; height: 1024px; border: 2px solid rgba(255,255,255,0.1); overflow: hidden; }
        .main-laptop { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 800px; mix-blend-mode: lighten; pointer-events: none; }
        #draggable-logo {
            position: absolute;
            top: 300px; left: 300px;
            width: 250px; height: 150px;
            background: white; border-radius: 4px; border: 1px solid rgba(0,0,0,0.2);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: move; z-index: 100;
            box-shadow: 0 0 30px rgba(255,255,255,0.4);
            /* Initial perspectiveguess */
            transform: perspective(1000px) rotateY(-25deg) rotateX(15deg) skewY(2deg);
        }
        .screen-logo-lyceena { font-size: 32px; font-weight: 900; color: #1a2d59; }
        .screen-logo-academy { font-size: 18px; font-weight: 700; color: #39d6c3; }
        .controls { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; font-size: 11px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="controls">
    <b>Instructions for Agent:</b><br>
    1. Drag the logo to the center of the laptop screen.<br>
    2. Use Arrow Keys to nudge (1px).<br>
    3. Take a screenshot once aligned.<br>
    <div id="coords">Pos: 300, 300</div>
</div>

<div class="canvas-area" id="canvas">
    <img src="/laptop_3d.png" class="main-laptop">
    <div id="draggable-logo">
        <div class="screen-logo-lyceena">Lyceena</div>
        <div class="screen-logo-academy">academy</div>
    </div>
</div>

<script>
    const logo = document.getElementById('draggable-logo');
    const coords = document.getElementById('coords');
    let isDragging = false;
    let offset = [0, 0];

    logo.onmousedown = (e) => {
        isDragging = true;
        offset = [logo.offsetLeft - e.clientX, logo.offsetTop - e.clientY];
    };
    document.onmousemove = (e) => {
        if (!isDragging) return;
        logo.style.left = (e.clientX + offset[0]) + 'px';
        logo.style.top = (e.clientY + offset[1]) + 'px';
        coords.innerText = `Pos: ${logo.style.left}, ${logo.style.top}`;
    };
    document.onmouseup = () => { isDragging = false; };

    // Nudging with arrows
    document.onkeydown = (e) => {
        const step = e.shiftKey ? 10 : 1;
        if (e.key === 'ArrowUp') logo.style.top = (parseInt(logo.style.top || 300) - step) + 'px';
        if (e.key === 'ArrowDown') logo.style.top = (parseInt(logo.style.top || 300) + step) + 'px';
        if (e.key === 'ArrowLeft') logo.style.left = (parseInt(logo.style.left || 300) - step) + 'px';
        if (e.key === 'ArrowRight') logo.style.left = (parseInt(logo.style.left || 300) + step) + 'px';
        coords.innerText = `Pos: ${logo.style.left}, ${logo.style.top}`;
    };
</script>
</body>
</html>
