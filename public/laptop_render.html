<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Laptop Render Isolation v2</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a2d59;
            /* Matching the banner bg */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .laptop-container {
            position: relative;
            width: 1000px;
            height: 1000px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-laptop {
            width: 600px;
            /* Same blending magic as final banner */
            mix-blend-mode: lighten;
            filter: contrast(1.1) brightness(1.1);
        }

        .laptop-screen-content {
            position: absolute;
            /* Precisely positioning over the laptop image screen area */
            top: 418px;
            left: 367px;
            width: 258px;
            height: 145px;
            background: rgba(255, 255, 255, 0.95);
            /* Screen glow */
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Advanced perspective to match the 3D render angle */
            transform: perspective(1000px) rotateY(-24.5deg) rotateX(14deg) skewY(2.2deg);
            z-index: 6;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .screen-logo-text {
            font-family: 'Segoe UI', 'Outfit', Arial, sans-serif;
            text-align: center;
            padding: 10px;
        }

        .screen-logo-lyceena {
            font-size: 38px;
            font-weight: 900;
            color: #1a2d59;
            margin-bottom: -5px;
            letter-spacing: -1px;
        }

        .screen-logo-academy {
            font-size: 22px;
            font-weight: 700;
            color: #39d6c3;
            text-transform: lowercase;
        }
    </style>
</head>

<body>
    <div class="laptop-container">
        <img src="/laptop_3d.png" class="main-laptop" alt="Laptop">
        <div class="laptop-screen-content">
            <div class="screen-logo-text">
                <div class="screen-logo-lyceena">Lyceena</div>
                <div class="screen-logo-academy">academy</div>
            </div>
        </div>
    </div>
</body>

</html>
