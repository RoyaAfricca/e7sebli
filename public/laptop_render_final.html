<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clean Laptop Render</title>
    <style>
        body { margin: 0; padding: 0; background: #1a2d59; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .canvas { position: relative; width: 1000px; height: 1000px; background: #1a2d59; }
        .main-laptop { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 800px; mix-blend-mode: lighten; }
        .screen-logo {
            position: absolute;
            /* Using the perfectly aligned coordinates found by the interactive tool */
            top: 418px; 
            left: 367px;
            width: 250px; height: 150px;
            background: rgba(255, 255, 255, 0.98); 
            border-radius: 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: perspective(1000px) rotateY(-25deg) rotateX(15deg) skewY(2deg);
            box-shadow: 0 0 30px rgba(255,255,255,0.4);
            z-index: 10;
        }
        .logo-lyceena { font-family: 'Segoe UI', Arial, sans-serif; font-size: 38px; font-weight: 900; color: #1a2d59; margin-bottom: -5px; }
        .logo-academy { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: 700; color: #39d6c3; }
    </style>
</head>
<body>
<div class="canvas">
    <img src="/laptop_3d.png" class="main-laptop">
    <div class="screen-logo">
        <div class="logo-lyceena">Lyceena</div>
        <div class="logo-academy">academy</div>
    </div>
</div>
</body>
</html>
